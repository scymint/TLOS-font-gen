<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tlos Font Image Generator</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: 'TlosTitle';
            src: url('tlos_title_font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>The Legend of Spyro</h1>
        <h2>Font Image Generator</h2>

        <div class="controls">
            <label>Text
                <textarea id="text" rows="3" placeholder="Type your text here">The Legend of Spyro</textarea>
            </label>

            <label>Font size
                <input id="size" type="range" min="24" max="300" value="72">
            </label>

            <label>Letter spacing (px)
                <input id="letterSpacing" type="range" min="0" max="200" value="0">
            </label>

            <label>Stretch X (%)
                <input id="stretchX" type="range" min="50" max="200" value="100">
            </label>

            <label>Text color
                <select id="fillType">
                    <option value="solid">Solid</option>
                    <option value="linear">Linear gradient</option>
                </select>
                <input id="color" type="color" value="#000000">
                <div id="textGradientControls" class="grad-controls hidden">
                    <input id="color1" type="color" value="#000000">
                    <input id="color2" type="color" value="#ff0000">
                    <label>Angle <input id="angle" type="range" min="0" max="360" value="0"></label>
                </div>
            </label>

            <label>Stretch Y (%)
                <input id="stretchY" type="range" min="50" max="200" value="100">
            </label>



            <div class="buttons">
                <button id="download">Download PNG</button>
            </div>
        </div>

        <section class="preview">
            <canvas id="canvas"></canvas>
        </section>
    </main>

    <script src="script.js"></script>
